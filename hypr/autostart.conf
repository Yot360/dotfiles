# System things
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = /usr/libexec/hyprpolkitagent &
exec-once = gentoo-pipewire-launcher restart &
exec-once = awww-daemon &
exec-once = ~/.config/hypr/scripts/wallch.sh
exec-once = hypridle &

# Clipboard
exec-once = cliphist wipe
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Audio
exec-once = flatpak run com.github.wwmm.easyeffects --gapplication-service

# Instant replay
exec-once = gpu-screen-recorder -w DP-2 -c mkv -f 30 -a "default_output|easyeffects_source" -q 10000 -bm cbr -fm cfr -r 60 -o ~/Videos/replay

# Apps
exec-once = swaync &
exec-once = waybar &
exec-once = firefox-bin &
exec-once = steam &
exec-once = flatpak run com.spotify.Client &
exec-once = telegram-desktop &
exec-once = vesktop-bin &
